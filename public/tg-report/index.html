<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Report — AutoBOM Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-border: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, 0.1);
            --amber: #f59e0b;
            --amber-bg: rgba(245, 158, 11, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 100px;
        }

        .header {
            text-align: center;
            padding: 12px 0 20px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .date {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .header .user {
            font-size: 14px;
            color: var(--text);
            margin-top: 2px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        .loading .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--card-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            background: var(--red-bg);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            color: var(--red);
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

        /* ── Task Cards ── */
        .task-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            margin-bottom: 14px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .task-card.has-blocker { border-left: 3px solid var(--red); }

        .task-header {
            padding: 14px 16px 10px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .task-status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }
        .task-status-dot.in_progress { background: var(--accent); }
        .task-status-dot.pending { background: var(--amber); }
        .task-status-dot.blocked { background: var(--red); }
        .task-status-dot.backlog { background: var(--text-dim); }

        .task-title {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.3;
            flex: 1;
        }
        .task-progress-badge {
            font-size: 13px;
            font-weight: 800;
            color: var(--accent);
            white-space: nowrap;
        }

        .task-body { padding: 0 16px 14px; }

        /* ── Subtasks ── */
        .subtask-list { margin-bottom: 12px; }
        .subtask-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(51,65,85,0.4);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .subtask-item:last-child { border-bottom: none; }

        .subtask-check {
            width: 22px; height: 22px;
            border-radius: 6px;
            border: 2px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .subtask-check.checked {
            background: var(--green);
            border-color: var(--green);
        }
        .subtask-check.checked::after {
            content: '✓';
            color: white;
            font-size: 13px;
            font-weight: 900;
        }
        .subtask-label {
            font-size: 14px;
            color: var(--text);
            flex: 1;
            line-height: 1.3;
        }
        .subtask-item.completed .subtask-label {
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .subtask-progress-text {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ── Slider (no subtasks) ── */
        .slider-group {
            margin-bottom: 12px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .slider-label .value { color: var(--accent); font-weight: 800; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--card-border);
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px; height: 24px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            cursor: pointer;
        }

        /* ── Hours Input ── */
        .hours-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .hours-label {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .hours-input-group {
            display: flex;
            align-items: center;
            gap: 0;
            flex: 1;
        }
        .hours-btn {
            width: 36px; height: 36px;
            border: 1px solid var(--card-border);
            background: var(--bg);
            color: var(--text);
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .hours-btn:first-child { border-radius: 8px 0 0 8px; }
        .hours-btn:last-child { border-radius: 0 8px 8px 0; }
        .hours-btn:active { background: var(--accent); }

        .hours-value {
            width: 52px; height: 36px;
            border: 1px solid var(--card-border);
            border-left: none; border-right: none;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            outline: none;
        }

        /* ── Blocker Toggle ── */
        .blocker-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg);
            border-radius: 10px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .blocker-row.active {
            background: var(--red-bg);
            border: 1px solid rgba(239,68,68,0.3);
        }
        .blocker-toggle {
            width: 40px; height: 22px;
            border-radius: 11px;
            background: var(--card-border);
            position: relative;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .blocker-toggle.active { background: var(--red); }
        .blocker-toggle::after {
            content: '';
            width: 18px; height: 18px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 2px; left: 2px;
            transition: transform 0.2s;
        }
        .blocker-toggle.active::after { transform: translateX(18px); }
        .blocker-text {
            font-size: 13px;
            color: var(--text-dim);
            flex: 1;
        }
        .blocker-row.active .blocker-text { color: var(--red); font-weight: 600; }

        .blocker-note-input {
            display: none;
            margin-top: 8px;
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            resize: none;
        }
        .blocker-note-input.visible { display: block; }

        /* ── Global Note ── */
        .note-section {
            margin-top: 8px;
            margin-bottom: 16px;
        }
        .note-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .note-input {
            width: 100%;
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 50px;
        }

        /* ── Submit Button ── */
        .submit-area { 
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: transform 0.1s, opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Success state ── */
        .success-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        .success-screen.visible { display: block; }
        .success-icon { font-size: 64px; margin-bottom: 16px; }
        .success-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .success-subtitle {
            font-size: 14px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ Quick Report</h1>
        <div class="user" id="userName"></div>
        <div class="date" id="dateStr"></div>
    </div>

    <div id="loadingView" class="loading">
        <div class="spinner"></div>
        <div>Cargando tareas...</div>
    </div>

    <div id="errorView" class="error-box" style="display:none"></div>

    <div id="emptyView" class="empty-state" style="display:none">
        <div class="icon">✅</div>
        <div>No tienes tareas activas para hoy.</div>
    </div>

    <div id="tasksContainer" style="display:none"></div>

    <div class="note-section" id="noteSection" style="display:none">
        <div class="note-label">💬 Nota adicional (opcional)</div>
        <textarea class="note-input" id="globalNote" placeholder="Algo que quieras reportar..."></textarea>
    </div>

    <div id="successView" class="success-screen">
        <div class="success-icon">🎉</div>
        <div class="success-title">¡Reporte enviado!</div>
        <div class="success-subtitle" id="successMsg"></div>
    </div>

    <div class="submit-area" id="submitArea" style="display:none">
        <button class="submit-btn" id="submitBtn" onclick="submitReport()">
            ✅ Enviar Reporte
        </button>
    </div>

    <script>
        // ── Firebase Config (same as main app) ──
        const FIREBASE_CONFIG = {
            projectId: "bom-ame-cr",
            apiKey: "AIzaSyBJJLnbKQx7Pv4rCFFhlFNJGbVpHgSCWko",
        };

        const FUNCTIONS_BASE = `https://us-central1-${FIREBASE_CONFIG.projectId}.cloudfunctions.net`;

        // ── Telegram WebApp ──
        const tg = window.Telegram?.WebApp;
        let chatId = null;
        let reportData = { tasks: [] };

        // ── Init ──
        document.addEventListener('DOMContentLoaded', () => {
            if (tg) {
                tg.ready();
                tg.expand();
                chatId = tg.initDataUnsafe?.user?.id || null;
                
                // Apply Telegram theme
                if (tg.themeParams?.bg_color) {
                    document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color);
                }
            }

            // Set date
            const now = new Date();
            const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
            const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            document.getElementById('dateStr').textContent = 
                `${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]} ${now.getFullYear()}`;

            // For testing outside Telegram
            if (!chatId) {
                const params = new URLSearchParams(window.location.search);
                chatId = params.get('chatId') || params.get('uid');
            }

            if (!chatId) {
                showError('No se pudo identificar tu cuenta de Telegram. Abre este enlace desde el bot.');
                return;
            }

            loadTasks();
        });

        async function callFunction(name, data) {
            const res = await fetch(`${FUNCTIONS_BASE}/${name}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data }),
            });
            const json = await res.json();
            if (json.error) throw new Error(json.error.message || json.error);
            return json.result;
        }

        async function loadTasks() {
            try {
                const result = await callFunction('getQuickReportData', { chatId: String(chatId) });

                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('userName').textContent = result.userName || '';

                if (!result.tasks || result.tasks.length === 0) {
                    document.getElementById('emptyView').style.display = 'block';
                    return;
                }

                reportData.tasks = result.tasks.map(t => ({
                    taskId: t.id,
                    title: t.title,
                    progressPercent: t.progressPercent || 0,
                    hoursWorked: 0,
                    blocked: t.status === 'blocked',
                    blockerNote: '',
                    hasSubtasks: t.hasSubtasks,
                    subtasks: (t.subtasks || []).map(st => ({
                        id: st.id,
                        title: st.title,
                        completed: st.completed,
                    })),
                }));

                renderTasks();
            } catch (err) {
                document.getElementById('loadingView').style.display = 'none';
                showError(err.message || 'Error cargando tareas');
            }
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = '';
            container.style.display = 'block';
            document.getElementById('noteSection').style.display = 'block';
            document.getElementById('submitArea').style.display = 'block';

            reportData.tasks.forEach((task, idx) => {
                const card = document.createElement('div');
                card.className = 'task-card' + (task.blocked ? ' has-blocker' : '');
                card.id = `task-${idx}`;

                let bodyHTML = '';

                if (task.hasSubtasks && task.subtasks.length > 0) {
                    // ── Subtask checkboxes → auto-calculate progress ──
                    const completed = task.subtasks.filter(s => s.completed).length;
                    const total = task.subtasks.length;
                    const pct = Math.round((completed / total) * 100);
                    task.progressPercent = pct;

                    bodyHTML += `<div class="subtask-progress-text">Subtareas ${completed}/${total} — ${pct}%</div>`;
                    bodyHTML += '<div class="subtask-list">';
                    task.subtasks.forEach((st, si) => {
                        bodyHTML += `
                            <div class="subtask-item ${st.completed ? 'completed' : ''}" 
                                 onclick="toggleSubtask(${idx}, ${si})">
                                <div class="subtask-check ${st.completed ? 'checked' : ''}"></div>
                                <span class="subtask-label">${esc(st.title)}</span>
                            </div>
                        `;
                    });
                    bodyHTML += '</div>';
                } else {
                    // ── Slider for manual progress ──
                    bodyHTML += `
                        <div class="slider-group">
                            <div class="slider-label">
                                <span>Avance</span>
                                <span class="value" id="pctVal-${idx}">${task.progressPercent}%</span>
                            </div>
                            <input type="range" min="0" max="100" step="5" 
                                   value="${task.progressPercent}" 
                                   oninput="updateProgress(${idx}, this.value)">
                        </div>
                    `;
                }

                // Hours
                bodyHTML += `
                    <div class="hours-row">
                        <span class="hours-label">⏱ Horas hoy</span>
                        <div class="hours-input-group">
                            <div class="hours-btn" onclick="adjustHours(${idx}, -0.5)">−</div>
                            <input type="number" class="hours-value" id="hours-${idx}" 
                                   value="${task.hoursWorked}" min="0" max="24" step="0.5"
                                   onchange="updateHours(${idx}, this.value)">
                            <div class="hours-btn" onclick="adjustHours(${idx}, 0.5)">+</div>
                        </div>
                    </div>
                `;

                // Blocker toggle
                bodyHTML += `
                    <div class="blocker-row ${task.blocked ? 'active' : ''}" 
                         onclick="toggleBlocker(${idx})">
                        <div class="blocker-toggle ${task.blocked ? 'active' : ''}" id="blockerToggle-${idx}"></div>
                        <span class="blocker-text">🚧 Bloqueado</span>
                    </div>
                    <textarea class="blocker-note-input ${task.blocked ? 'visible' : ''}" 
                              id="blockerNote-${idx}" 
                              placeholder="¿Qué te bloquea?"
                              oninput="updateBlockerNote(${idx}, this.value)">${task.blockerNote}</textarea>
                `;

                const statusClass = task.blocked ? 'blocked' : (task.progressPercent > 0 ? 'in_progress' : 'pending');

                card.innerHTML = `
                    <div class="task-header">
                        <div class="task-status-dot ${statusClass}"></div>
                        <div class="task-title">${esc(task.title)}</div>
                        <div class="task-progress-badge" id="badge-${idx}">${task.progressPercent}%</div>
                    </div>
                    <div class="task-body">${bodyHTML}</div>
                `;

                container.appendChild(card);
            });
        }

        // ── Interactions ──

        function toggleSubtask(taskIdx, subIdx) {
            const task = reportData.tasks[taskIdx];
            const st = task.subtasks[subIdx];
            st.completed = !st.completed;

            // Recalculate progress
            const completed = task.subtasks.filter(s => s.completed).length;
            const total = task.subtasks.length;
            task.progressPercent = Math.round((completed / total) * 100);

            renderTasks();
        }

        function updateProgress(taskIdx, value) {
            reportData.tasks[taskIdx].progressPercent = parseInt(value);
            document.getElementById(`pctVal-${taskIdx}`).textContent = value + '%';
            document.getElementById(`badge-${taskIdx}`).textContent = value + '%';
        }

        function adjustHours(taskIdx, delta) {
            const input = document.getElementById(`hours-${taskIdx}`);
            let val = parseFloat(input.value || 0) + delta;
            if (val < 0) val = 0;
            if (val > 24) val = 24;
            input.value = val;
            reportData.tasks[taskIdx].hoursWorked = val;
        }

        function updateHours(taskIdx, value) {
            reportData.tasks[taskIdx].hoursWorked = parseFloat(value) || 0;
        }

        function toggleBlocker(taskIdx) {
            const task = reportData.tasks[taskIdx];
            task.blocked = !task.blocked;
            renderTasks();
        }

        function updateBlockerNote(taskIdx, value) {
            reportData.tasks[taskIdx].blockerNote = value;
        }

        // ── Submit ──

        async function submitReport() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Enviando...';

            try {
                const payload = {
                    chatId: String(chatId),
                    tasks: reportData.tasks.map(t => ({
                        taskId: t.taskId,
                        progressPercent: t.progressPercent,
                        hoursWorked: t.hoursWorked,
                        blocked: t.blocked,
                        blockerNote: t.blockerNote || '',
                        subtasks: t.subtasks.map(st => ({
                            id: st.id,
                            completed: st.completed,
                        })),
                    })),
                    note: document.getElementById('globalNote').value || '',
                };

                const result = await callFunction('submitQuickReport', payload);

                // Show success
                document.getElementById('tasksContainer').style.display = 'none';
                document.getElementById('noteSection').style.display = 'none';
                document.getElementById('submitArea').style.display = 'none';
                document.getElementById('successView').classList.add('visible');
                document.getElementById('successMsg').textContent = 
                    `${result.updatedCount} tarea(s) reportada(s) correctamente`;

                // Close after 2.5s
                setTimeout(() => {
                    if (tg) tg.close();
                }, 2500);

            } catch (err) {
                btn.disabled = false;
                btn.textContent = '✅ Enviar Reporte';
                alert('Error: ' + (err.message || 'No se pudo enviar'));
            }
        }

        // ── Helpers ──
        function showError(msg) {
            document.getElementById('loadingView').style.display = 'none';
            const el = document.getElementById('errorView');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>
</html>
